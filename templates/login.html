<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDRsai — MultiLog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #3d3d3d;
    }

    .card {
      background: #ffffff;
      border-radius: 2px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
      padding: 0;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .card-top {
      background: #ffffff;
      padding: 24px 32px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 3px solid #E8521A;
    }

    .sa-logo {
      display: flex;
      align-items: center;
    }

    .card-title {
      font-size: 12px;
      color: #888;
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    /* form body */
    .card-body {
      padding: 24px 32px 28px;
      background: #fff;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #3d3d3d;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 3px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #E8521A;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(232,82,26,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #E8521A;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.18s, transform 0.12s;
    }

    .btn-login:hover  { background: #d04410; }
    .btn-login:active { transform: scale(0.98); }

    .error-box {
      background: #fff5f2;
      border: 1.5px solid #E8521A;
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c03a0a;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .divider {
      border: none;
      border-top: 1px solid #ececec;
      margin: 24px 0 18px;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      line-height: 1.7;
    }

    .footer-note strong {
      color: #3d3d3d;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="card-top">
      <div class="sa-logo">
        <img src="/static/sanantoniointernacional_logo.png" alt="San Antonio Internacional" style="height:120px;width:auto;display:block;">
      </div>
      <div style="font-size:20px;font-weight:800;color:#E8521A;letter-spacing:0.05em;">MultiLog</div>
      <div class="card-title">
        EDRsai &nbsp;·&nbsp; Sistema de Monitoreo de Perforación en Tiempo Real
      </div>
    </div>

    <div class="card-body">

      {% if error %}
      <div class="error-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" autocomplete="off">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="Ingresá tu usuario"
                 autofocus autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••"
                 autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login">Ingresar</button>
      </form>

      <hr class="divider" />
      <p class="footer-note">
        <strong>EDRsai MultiLog</strong> &nbsp;·&nbsp; Realtime Drilling Intelligence<br />
        © 2026 Eduardo Pinto &nbsp;·&nbsp; San Antonio Internacional
      </p>

    </div>
  </div>
</body>
</html>
