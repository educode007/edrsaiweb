<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EDR SAI — Log</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0e1117; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; }

    .hdr {
      height: 42px; background: #10162a; color: #d4defb;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 10px; border-bottom: 2px solid #060a15; flex-shrink: 0;
    }
    .hdr-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-weight: 900; letter-spacing: .1em; color: #7ec8ff; }
    .nav-link { color: #99aacc; text-decoration: none; font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
    .nav-link:hover { background: #1f2740; color: #dde7ff; }
    .nav-link.active { background: #1a2d60; color: #9ed2ff; }
    .logout-link { margin-left: 10px; color: #99aacc; font-size: 11px; font-weight: 700; text-decoration: none; padding: 3px 8px; border: 1px solid #2a3a5a; border-radius: 4px; }

    #wrap { display: flex; flex-direction: column; height: calc(100vh - 42px); overflow: hidden; }

    /* ── Toolbar ── */
    #toolbar {
      display: flex; align-items: center; gap: 8px; padding: 5px 10px;
      background: #181d28; border-bottom: 1px solid #2e3340; flex-shrink: 0; flex-wrap: wrap;
    }
    #toolbar label { color: #8898bb; font-size: 11px; }
    #toolbar input[type=number] {
      width: 72px; background: #232838; border: 1px solid #3a4055;
      color: #e0e4ef; border-radius: 4px; padding: 3px 6px; font-size: 12px;
    }
    .btn { padding: 4px 11px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-primary { background: #2979c8; color: #fff; }
    .btn-primary:hover { background: #3a8ee0; }
    .btn-success { background: #287a3c; color: #fff; }
    .btn-success:hover { background: #35a050; }
    .btn-danger  { background: #7a2020; color: #fff; }
    .btn-danger:hover  { background: #b03030; }
    #rtBadge {
      padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700;
      background: #1a2710; color: #50c050; border: 1px solid #2a4020;
      transition: background .3s;
    }
    #rtBadge.live { background: #1a3a10; color: #70ff70; }
    #statusBar { margin-left: auto; font-size: 11px; color: #7ec8f7; background: #131720; padding: 3px 10px; border-radius: 4px; }

    /* ── Main: labels + charts ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    #labels {
      width: 110px; flex-shrink: 0; background: #181d28; border-right: 2px solid #2e3340;
      display: flex; flex-direction: column;
    }
    .lbl-spacer { height: 26px; border-bottom: 1px solid #2e3340; flex-shrink: 0; }
    .track-lbl {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      padding: 0 8px; border-bottom: 1px solid #2e3340; color: #b8ccee; font-size: 11px; font-weight: 700;
    }
    .track-lbl span { font-size: 9px; color: #5a7090; font-weight: 400; margin-top: 2px; }
    .track-lbl.rt-label { border-left: 3px solid #50c050; }

    #charts {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; cursor: crosshair;
    }
    #depthAxis { height: 26px; flex-shrink: 0; background: #10131a; border-bottom: 1px solid #2e3340; position: relative; overflow: hidden; }
    #depthAxis canvas { position: absolute; top: 0; left: 0; }
    .track { flex: 1; position: relative; border-bottom: 1px solid #1e2330; overflow: hidden; min-height: 50px; }
    .track canvas { position: absolute; inset: 0; }

    #cursorLine {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: rgba(255,220,50,0.8); pointer-events: none; display: none; z-index: 10;
    }
    #nowLine {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: rgba(80,255,80,0.7); pointer-events: none; display: none; z-index: 9;
    }

    /* ── Import modal ── */
    #importOverlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; align-items: center; justify-content: center;
    }
    #importOverlay.open { display: flex; }
    #importBox {
      background: #1e2535; border: 1px solid #3a4870; border-radius: 8px;
      padding: 22px 26px; width: 500px; max-width: 95vw;
    }
    #importBox h2 { color: #7ec8f7; font-size: 14px; margin-bottom: 14px; font-weight: 800; }
    .imp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .imp-row label { width: 130px; color: #8898bb; font-size: 12px; flex-shrink: 0; }
    .imp-row select, .imp-row input[type=file] {
      flex: 1; background: #232838; border: 1px solid #3a4055; color: #e0e4ef;
      border-radius: 4px; padding: 4px 8px; font-size: 12px;
    }
    #importPreview {
      background: #131720; border: 1px solid #2e3340; border-radius: 4px;
      padding: 7px; font-size: 10px; color: #607890; margin: 8px 0;
      max-height: 80px; overflow-y: auto; font-family: monospace; white-space: pre;
    }
    #importMsg { font-size: 12px; min-height: 18px; margin-top: 4px; }
    .imp-actions { display: flex; gap: 10px; margin-top: 12px; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">EDR SAI</div>
    <a href="/web" class="nav-link">Web</a>
    <a href="/log" class="nav-link active">Log</a>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <a href="/logout" class="logout-link">Salir</a>
  </div>
</div>

<div id="wrap">
  <div id="toolbar">
    <label>Desde (m)</label>
    <input type="number" id="depthFrom" value="0" step="10"/>
    <label>Hasta (m)</label>
    <input type="number" id="depthTo" value="500" step="10"/>
    <button class="btn btn-primary" onclick="drawAll()">Ver</button>
    <button class="btn btn-primary" onclick="fitAll()">Ajustar todo</button>
    <button class="btn btn-success" onclick="openImport()">&#8593; LAS / CSV</button>
    <button class="btn btn-danger"  onclick="clearLas()">Limpiar LAS</button>
    <div id="rtBadge">&#11044; Sin señal RT</div>
    <div id="statusBar">Sin datos</div>
  </div>

  <div id="main">
    <div id="labels">
      <div class="lbl-spacer"></div>
      <div class="track-lbl rt-label" id="lblGamma">
        Gamma Ray<span>RT — EDRsai</span>
      </div>
      <div class="track-lbl" id="lblGas">
        Gas Total<span>PPM — LAS/CSV</span>
      </div>
      <div class="track-lbl" id="lblRastros">
        Rastros HC<span>0=S/R … 4=Abu.</span>
      </div>
    </div>

    <div id="charts">
      <div id="depthAxis"><canvas id="cvAxis"></canvas></div>
      <div class="track" id="tGamma">  <canvas id="cvGamma"></canvas>  </div>
      <div class="track" id="tGas">    <canvas id="cvGas"></canvas>    </div>
      <div class="track" id="tRastros"><canvas id="cvRastros"></canvas></div>
      <div id="cursorLine"></div>
      <div id="nowLine"></div>
    </div>
  </div>
</div>

<!-- Import modal -->
<div id="importOverlay">
  <div id="importBox">
    <h2>&#8593; Importar LAS / CSV</h2>
    <div class="imp-row">
      <label>Archivo (.las/.csv)</label>
      <input type="file" id="impFile" accept=".las,.csv,.txt" onchange="onFileSelected()"/>
    </div>
    <div id="importPreview">Seleccioná un archivo...</div>
    <div class="imp-row">
      <label>Profundidad *</label>
      <select id="mapDepth"><option value="">— seleccionar —</option></select>
    </div>
    <div class="imp-row">
      <label>Gas Total</label>
      <select id="mapGas"><option value="">— ninguna —</option></select>
    </div>
    <div class="imp-row">
      <label>Rastros (0-4)</label>
      <select id="mapOil"><option value="">— ninguna —</option></select>
    </div>
    <div id="importMsg"></div>
    <div class="imp-actions">
      <button class="btn btn-success" onclick="doImport()">Importar</button>
      <button class="btn btn-primary" onclick="closeImport()">Cancelar</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let _las   = [];   // [{depth, gas, rastros}]  — from LAS file
let _rt    = [];   // [{depth, gamma}]          — from real-time EDRsai
let _rtNow = { hole_depth: null, gamma: null }; // latest RT point

let GAS_MAX = 2000;
const RASTROS_MAX = 4;
const RASTROS_COLORS = ['#1e2129','#5a2a04','#c8820a','#e8a020','#ffe040'];

// ── Canvas refs ───────────────────────────────────────────────────────────────
const cvs = {
  axis:    document.getElementById('cvAxis'),
  gamma:   document.getElementById('cvGamma'),
  gas:     document.getElementById('cvGas'),
  rastros: document.getElementById('cvRastros'),
};

// ── Window helpers ────────────────────────────────────────────────────────────
function getWindow() {
  return {
    from: parseFloat(document.getElementById('depthFrom').value) || 0,
    to:   parseFloat(document.getElementById('depthTo').value)   || 500,
  };
}
function setWindow(from, to) {
  if (to - from < 5) return;
  document.getElementById('depthFrom').value = from.toFixed(1);
  document.getElementById('depthTo').value   = to.toFixed(1);
}
function dToX(depth, W, from, to) {
  return ((depth - from) / (to - from)) * W;
}

// ── Resize ────────────────────────────────────────────────────────────────────
function resizeAll() {
  const axis = document.getElementById('depthAxis');
  cvs.axis.width  = axis.clientWidth;
  cvs.axis.height = axis.clientHeight;
  [['tGamma','cvGamma'],['tGas','cvGas'],['tRastros','cvRastros']].forEach(([wId, cId]) => {
    const wrap = document.getElementById(wId);
    const c    = document.getElementById(cId);
    c.width  = wrap.clientWidth;
    c.height = wrap.clientHeight;
  });
  drawAll();
}
window.addEventListener('resize', resizeAll);

// ── Grid helpers ──────────────────────────────────────────────────────────────
function drawDepthGrid(ctx, W, H, from, to) {
  const range = to - from;
  const mag   = Math.pow(10, Math.floor(Math.log10(Math.max(range / 8, 1))));
  const step  = Math.ceil((range / 8) / mag) * mag || 1;
  const start = Math.ceil(from / step) * step;
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (let d = start; d <= to + 0.01; d += step) {
    const x = Math.round(dToX(d, W, from, to));
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}
function drawDepthAxis() {
  const c = cvs.axis, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#10131a'; ctx.fillRect(0, 0, W, H);
  const range = to - from;
  const mag   = Math.pow(10, Math.floor(Math.log10(Math.max(range / 8, 1))));
  const step  = Math.ceil((range / 8) / mag) * mag || 1;
  const start = Math.ceil(from / step) * step;
  ctx.fillStyle = '#6080a0'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
  ctx.strokeStyle = '#2a3550'; ctx.lineWidth = 1;
  for (let d = start; d <= to + 0.01; d += step) {
    const x = Math.round(dToX(d, W, from, to));
    ctx.beginPath(); ctx.moveTo(x, H - 4); ctx.lineTo(x, H); ctx.stroke();
    ctx.fillText(d.toFixed(0) + ' m', x, H - 6);
  }
}

// ── Draw Gamma (RT) ───────────────────────────────────────────────────────────
function drawGamma() {
  const c = cvs.gamma, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111520'; ctx.fillRect(0, 0, W, H);
  drawDepthGrid(ctx, W, H, from, to);

  // Y axis labels
  ctx.fillStyle = 'rgba(100,200,100,0.2)'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
  [0, 50, 100, 150].forEach(v => {
    const y = H - (v / 150) * H;
    ctx.strokeStyle = 'rgba(80,180,80,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillText(v, 2, y - 2);
  });
  ctx.fillStyle = 'rgba(100,200,100,0.4)'; ctx.textAlign = 'right';
  ctx.fillText('API', W - 2, 12);

  const pts = _rt.filter(p => p.depth >= from - 0.5 && p.depth <= to + 0.5 && p.gamma != null);
  if (pts.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(dToX(pts[0].depth, W, from, to), H);
    pts.forEach(p => ctx.lineTo(dToX(p.depth, W, from, to), H - Math.min(1, p.gamma / 150) * H));
    ctx.lineTo(dToX(pts[pts.length-1].depth, W, from, to), H);
    ctx.closePath();
    ctx.fillStyle = 'rgba(60,180,60,0.35)'; ctx.fill();
    ctx.beginPath();
    pts.forEach((p, i) => {
      const x = dToX(p.depth, W, from, to);
      const y = H - Math.min(1, p.gamma / 150) * H;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#70e878'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // RT "now" dot
  if (_rtNow.gamma != null && _rtNow.hole_depth != null) {
    const x = dToX(_rtNow.hole_depth, W, from, to);
    const y = H - Math.min(1, _rtNow.gamma / 150) * H;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#90ffb0'; ctx.fill();
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

// ── Draw Gas Total (LAS) ──────────────────────────────────────────────────────
function drawGas() {
  const c = cvs.gas, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0f1520'; ctx.fillRect(0, 0, W, H);
  drawDepthGrid(ctx, W, H, from, to);

  ctx.fillStyle = 'rgba(60,140,255,0.18)'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
  const steps = [0, Math.round(GAS_MAX/4), Math.round(GAS_MAX/2), Math.round(GAS_MAX*3/4), GAS_MAX];
  steps.forEach(v => {
    const y = H - (v / GAS_MAX) * H;
    ctx.strokeStyle = 'rgba(40,80,200,0.07)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillText(v, 2, y - 2);
  });
  ctx.fillStyle = 'rgba(80,160,255,0.4)'; ctx.textAlign = 'right';
  ctx.fillText('PPM', W - 2, 12);

  const pts = _las.filter(p => p.depth >= from - 0.5 && p.depth <= to + 0.5 && p.gas != null);
  if (pts.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(dToX(pts[0].depth, W, from, to), H);
    pts.forEach(p => ctx.lineTo(dToX(p.depth, W, from, to), H - Math.min(1, p.gas / GAS_MAX) * H));
    ctx.lineTo(dToX(pts[pts.length-1].depth, W, from, to), H);
    ctx.closePath();
    ctx.fillStyle = 'rgba(30,80,200,0.45)'; ctx.fill();
    ctx.beginPath();
    pts.forEach((p, i) => {
      const x = dToX(p.depth, W, from, to);
      const y = H - Math.min(1, p.gas / GAS_MAX) * H;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#4ab0ff'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

// ── Draw Rastros (LAS) ────────────────────────────────────────────────────────
function drawRastros() {
  const c = cvs.rastros, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#100f18'; ctx.fillRect(0, 0, W, H);
  drawDepthGrid(ctx, W, H, from, to);

  // Reference lines 1-4
  for (let v = 1; v <= RASTROS_MAX; v++) {
    const y = H - (v / RASTROS_MAX) * (H - 4) - 2;
    ctx.strokeStyle = 'rgba(255,180,40,0.07)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(220,160,40,0.3)'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
  ['S/R','Ais.','Esc.','Reg.','Abu.'].forEach((lbl, i) => {
    const y = H - (i / RASTROS_MAX) * (H - 4) - 2;
    ctx.fillText(lbl, 2, y - 1);
  });

  const range = to - from;
  const barW  = Math.max(2, Math.min(14, (W / Math.max(range, 1)) * 0.9));
  const pts   = _las.filter(p => p.depth >= from - 0.5 && p.depth <= to + 0.5);

  pts.forEach(p => {
    const val = p.rastros != null ? p.rastros : 0;
    if (val <= 0) return;
    const x     = dToX(p.depth, W, from, to);
    const ratio = Math.min(val, RASTROS_MAX) / RASTROS_MAX;
    const barH  = Math.max(2, ratio * (H - 6));
    const ci    = Math.min(Math.round(val), RASTROS_COLORS.length - 1);
    ctx.fillStyle = RASTROS_COLORS[ci]; ctx.globalAlpha = 0.9;
    ctx.fillRect(x - barW / 2, H - barH - 3, barW, barH);
    ctx.globalAlpha = 1;
  });
}

// ── "Now" vertical line across all tracks ─────────────────────────────────────
function updateNowLine() {
  const nowLine = document.getElementById('nowLine');
  if (_rtNow.hole_depth == null) { nowLine.style.display = 'none'; return; }
  const { from, to } = getWindow();
  const W = document.getElementById('charts').clientWidth;
  const x = dToX(_rtNow.hole_depth, W, from, to);
  if (x < 0 || x > W) { nowLine.style.display = 'none'; return; }
  nowLine.style.left    = x + 'px';
  nowLine.style.display = 'block';
}

// ── Draw all ──────────────────────────────────────────────────────────────────
function drawAll() {
  drawDepthAxis();
  drawGamma();
  drawGas();
  drawRastros();
  updateNowLine();
  updateStatus();
}

function updateStatus() {
  const sb = document.getElementById('statusBar');
  const lasN  = _las.length;
  const rtN   = _rt.length;
  const now   = _rtNow.hole_depth != null ? ` | HD:${_rtNow.hole_depth.toFixed(1)}m` : '';
  const gNow  = _rtNow.gamma != null ? ` GR:${_rtNow.gamma.toFixed(0)}` : '';
  sb.textContent = `LAS:${lasN} pts | RT:${rtN} pts${now}${gNow}`;
}

function fitAll() {
  const depths = [];
  _las.forEach(p => depths.push(p.depth));
  _rt.forEach(p => depths.push(p.depth));
  if (!depths.length) return;
  setWindow(Math.floor(Math.min(...depths)), Math.ceil(Math.max(...depths)));
  drawAll();
}

async function clearLas() {
  if (!confirm('¿Borrar datos LAS?')) return;
  await fetch('/api/log/data', { method: 'DELETE' });
  _las = []; GAS_MAX = 2000; drawAll();
}

// ── Socket.IO — real-time gamma from EDRsai ──────────────────────────────────
const socket = io({ transports: ['websocket', 'polling'] });
const badge  = document.getElementById('rtBadge');

socket.on('connect', () => {
  badge.textContent = '● Conectado';
  badge.className   = 'live';
  // Load historical gamma on connect
  fetch('/api/web/history?limit=2000')
    .then(r => r.json())
    .then(rows => {
      rows.forEach(row => {
        const d = row.gamma_depth ?? row.hole_depth;
        if (d != null && row.gamma != null) {
          _rt.push({ depth: d, gamma: row.gamma });
        }
      });
      _rt.sort((a, b) => a.depth - b.depth);
      if (_rt.length && !_las.length) {
        setWindow(Math.floor(_rt[0].depth), Math.ceil(_rt[_rt.length-1].depth));
      }
      drawAll();
    });
});

socket.on('disconnect', () => {
  badge.textContent = '○ Sin señal RT';
  badge.className   = '';
});

socket.on('web_update', d => {
  badge.textContent = '● En vivo';
  badge.className   = 'live';
  // Update "now" cursor
  _rtNow.hole_depth = d.hole_depth ?? _rtNow.hole_depth;
  _rtNow.gamma      = d.gamma      ?? _rtNow.gamma;
  // Accumulate RT gamma track
  const depth = d.gamma_depth ?? d.hole_depth;
  if (depth != null && d.gamma != null) {
    // Deduplicate by depth
    const last = _rt[_rt.length - 1];
    if (!last || Math.abs(last.depth - depth) > 0.05) {
      _rt.push({ depth, gamma: d.gamma });
      if (_rt.length > 5000) _rt.shift();
    } else {
      last.gamma = d.gamma; // update in place
    }
  }
  drawAll();
});

// ── Cursor line ───────────────────────────────────────────────────────────────
const chartsDiv = document.getElementById('charts');
const cursorEl  = document.getElementById('cursorLine');

chartsDiv.addEventListener('mousemove', e => {
  const rect  = chartsDiv.getBoundingClientRect();
  const x     = e.clientX - rect.left;
  cursorEl.style.left    = x + 'px';
  cursorEl.style.display = 'block';
  const { from, to } = getWindow();
  const depth = from + (x / chartsDiv.clientWidth) * (to - from);
  document.getElementById('statusBar').textContent =
    `Cursor: ${depth.toFixed(1)} m | LAS:${_las.length} | RT:${_rt.length}`;
});
chartsDiv.addEventListener('mouseleave', () => {
  cursorEl.style.display = 'none';
  updateStatus();
});

// ── Zoom con rueda ────────────────────────────────────────────────────────────
chartsDiv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect   = chartsDiv.getBoundingClientRect();
  const xRatio = (e.clientX - rect.left) / chartsDiv.clientWidth;
  const { from, to } = getWindow();
  const range   = to - from;
  const factor  = e.deltaY > 0 ? 1.15 : (1 / 1.15);
  const newRange = range * factor;
  const pivot   = from + xRatio * range;
  setWindow(pivot - xRatio * newRange, pivot + (1 - xRatio) * newRange);
  drawAll();
}, { passive: false });

// ── Pan con drag ──────────────────────────────────────────────────────────────
let _drag = null;
chartsDiv.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const { from, to } = getWindow();
  _drag = { startX: e.clientX, from, to, range: to - from };
  chartsDiv.style.cursor = 'grabbing'; e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!_drag) return;
  const dxPx   = e.clientX - _drag.startX;
  const dDepth = -(dxPx / chartsDiv.clientWidth) * _drag.range;
  setWindow(_drag.from + dDepth, _drag.to + dDepth);
  drawAll();
});
window.addEventListener('mouseup', () => {
  if (_drag) { _drag = null; chartsDiv.style.cursor = 'crosshair'; }
});

// ── Import modal ──────────────────────────────────────────────────────────────
let _impFile = null;

function openImport()  { document.getElementById('importOverlay').classList.add('open'); }
function closeImport() { document.getElementById('importOverlay').classList.remove('open'); }
document.getElementById('importOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('importOverlay')) closeImport();
});

function _fillSelects(cols) {
  ['mapDepth','mapGas','mapOil'].forEach((id, i) => {
    const blanks = ['— seleccionar —','— ninguna —','— ninguna —'];
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">${blanks[i]}</option>`;
    cols.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; el.appendChild(o); });
  });
  const auto = {
    mapDepth: ['DEPT','DEPTH','MD','DPTH','PROF','PROFUNDIDAD'],
    mapGas:   ['GASTOTAL','GAS','GASTOT','GAS_TOTAL','GTOT'],
    mapOil:   ['RASTROS','OIL','OIL_SHOW','PETROLEO'],
  };
  for (const [id, cands] of Object.entries(auto)) {
    const m = cols.find(c => cands.includes(c.toUpperCase()));
    if (m) document.getElementById(id).value = m;
  }
}

async function onFileSelected() {
  const input = document.getElementById('impFile');
  _impFile = input.files[0];
  if (!_impFile) return;
  const msg = document.getElementById('importMsg');
  msg.textContent = 'Leyendo...'; msg.style.color = '#7ec8f7';
  const fd = new FormData(); fd.append('file', _impFile);
  try {
    const res = await fetch('/api/log/parse', { method: 'POST', body: fd });
    if (res.status === 401) {
      msg.textContent = '✗ Sesión expirada — recargá la página'; msg.style.color = '#e05050';
      return;
    }
    if (!res.ok) {
      msg.textContent = `✗ Error servidor (${res.status})`; msg.style.color = '#e05050';
      return;
    }
    const data = await res.json();
    if (!data.ok) { msg.textContent = '✗ ' + data.error; msg.style.color = '#e05050'; return; }
    _fillSelects(data.columns);
    const cols = data.columns, rows = data.preview;
    let txt = cols.join('\t') + '\n';
    rows.forEach(r => { txt += cols.map(c => r[c] != null ? r[c] : '—').join('\t') + '\n'; });
    document.getElementById('importPreview').textContent = txt;
    msg.textContent = `✓ ${cols.length} columnas — ${_impFile.name}`; msg.style.color = '#50d090';
  } catch(e) {
    msg.textContent = '✗ ' + (e.message || 'Error de red'); msg.style.color = '#e05050';
  }
}

async function doImport() {
  if (!_impFile) { document.getElementById('importMsg').textContent = '⚠ Seleccioná un archivo'; return; }
  const colDepth = document.getElementById('mapDepth').value;
  if (!colDepth) { document.getElementById('importMsg').textContent = '⚠ Seleccioná columna profundidad'; return; }
  const msg = document.getElementById('importMsg');
  msg.textContent = 'Importando...'; msg.style.color = '#7ec8f7';
  const fd = new FormData();
  fd.append('file',         _impFile);
  fd.append('col_depth',    colDepth);
  fd.append('col_gas',      document.getElementById('mapGas').value);
  fd.append('col_oil_show', document.getElementById('mapOil').value);
  try {
    const res  = await fetch('/api/log/import', { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.ok) { msg.textContent = '✗ ' + data.error; msg.style.color = '#e05050'; return; }
    // Server already stored data — just load it back from server to stay in sync
    _las = data.rows;
    _las.sort((a, b) => a.depth - b.depth);
    // update GAS_MAX
    const mx = Math.max(..._las.filter(p => p.gas != null).map(p => p.gas), 0);
    if (mx > 0) GAS_MAX = Math.ceil(mx / 500) * 500;
    msg.textContent = `✓ ${data.inserted} filas guardadas`; msg.style.color = '#50d090';
    fitAll();
    setTimeout(closeImport, 800);
  } catch(e) {
    msg.textContent = '✗ Error al importar'; msg.style.color = '#e05050';
  }
}

// ── Init: load persisted LAS data from server ────────────────────────────────
async function loadPersistedLas() {
  try {
    const res  = await fetch('/api/log/data');
    const data = await res.json();
    if (data.ok && data.rows.length) {
      _las = data.rows;
      _las.sort((a, b) => a.depth - b.depth);
      const mx = Math.max(..._las.filter(p => p.gas != null).map(p => p.gas), 0);
      if (mx > 0) GAS_MAX = Math.ceil(mx / 500) * 500;
      // Fit window to data range and redraw
      fitAll();
      document.getElementById('statusBar').textContent =
        `LAS restaurado: ${_las.length} pts`;
    }
  } catch(e) { /* silent */ }
}

window.addEventListener('load', async () => {
  resizeAll();                  // size canvases first
  await loadPersistedLas();     // then fetch + draw
});
</script>
