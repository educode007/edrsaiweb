<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EDR SAI — Log</title>
  <style>
    :root {
      --bg: #ececec; --panel: #ffffff; --line: #c3c3c3; --ink: #111;
      --muted: #666; --header: #10162a; --headerText: #d4defb; --ok: #00bf63;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; }

    /* ── Header ── */
    .hdr {
      height: 42px; background: var(--header); color: var(--headerText);
      display: flex; align-items: center; justify-content: space-between; padding: 0 10px;
      border-bottom: 2px solid #060a15;
    }
    .hdr-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-weight: 900; letter-spacing: .1em; color: #7ec8ff; }
    .nav-link {
      color: #99aacc; text-decoration: none; font-size: 12px; font-weight: 700;
      padding: 4px 8px; border-radius: 4px;
    }
    .nav-link:hover { background: #1f2740; color: #dde7ff; }
    .nav-link.active { background: #1a2d60; color: #9ed2ff; }
    .logout-link {
      margin-left: 10px; color: #99aacc; font-size: 11px; font-weight: 700;
      text-decoration: none; padding: 3px 8px; border: 1px solid #2a3a5a;
      border-radius: 4px; letter-spacing: .03em;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex; align-items: center; gap: 8px; padding: 6px 12px;
      background: #22262f; border-bottom: 1px solid #2e3340; flex-shrink: 0;
    }
    #toolbar label { color: #aab; font-size: 11px; }
    #toolbar input[type=number] {
      width: 70px; background: #2d3140; border: 1px solid #3a4055; color: #e0e4ef;
      border-radius: 4px; padding: 3px 6px; font-size: 12px;
    }
    .btn { padding: 4px 11px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-primary { background: #2979c8; color: #fff; }
    .btn-primary:hover { background: #3a8ee0; }
    .btn-success { background: #287a3c; color: #fff; }
    .btn-success:hover { background: #35a050; }
    .btn-danger  { background: #b03030; color: #fff; }
    #statusBar { margin-left: auto; font-size: 11px; color: #7ec8f7; background: #1a1d23; padding: 3px 10px; border-radius: 4px; }

    /* ── Main layout ── */
    #wrap { display: flex; flex-direction: column; height: calc(100vh - 42px); overflow: hidden; }
    #main { display: flex; flex: 1; overflow: hidden; }

    /* Label column */
    #labels {
      width: 120px; flex-shrink: 0; background: #22262f; border-right: 2px solid #3a4055;
      display: flex; flex-direction: column;
    }
    .track-label {
      display: flex; flex-direction: column; justify-content: center; padding: 0 10px;
      border-bottom: 1px solid #2e3340; font-weight: 700; color: #c8d8f0; font-size: 12px;
    }
    .track-label span.unit { font-size: 10px; color: #7a8aaa; font-weight: 400; margin-top: 2px; }

    /* Charts */
    #charts { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    #depthAxis { height: 28px; flex-shrink: 0; background: #1a1d23; border-bottom: 1px solid #3a4055; position: relative; overflow: hidden; }
    #depthAxisCanvas { position: absolute; top: 0; left: 0; }
    .track { flex: 1; position: relative; border-bottom: 1px solid #2e3340; overflow: hidden; min-height: 60px; }
    .track canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #cursorLine { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,200,40,0.75); pointer-events: none; display: none; z-index: 10; }

    /* Import modal */
    #importOverlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      z-index: 200; align-items: center; justify-content: center;
    }
    #importOverlay.open { display: flex; }
    #importBox {
      background: #22262f; border: 1px solid #3a4055; border-radius: 8px;
      padding: 22px 26px; width: 500px; max-width: 95vw;
    }
    #importBox h2 { color: #7ec8f7; font-size: 14px; margin-bottom: 14px; font-weight: 800; }
    .imp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .imp-row label { width: 140px; color: #aab; font-size: 12px; flex-shrink: 0; }
    .imp-row select, .imp-row input[type=file] {
      flex: 1; background: #2d3140; border: 1px solid #3a4055; color: #e0e4ef;
      border-radius: 4px; padding: 4px 8px; font-size: 12px;
    }
    #importPreview {
      background: #1a1d23; border: 1px solid #2e3340; border-radius: 4px;
      padding: 7px; font-size: 11px; color: #7a9abb; margin: 8px 0;
      max-height: 90px; overflow-y: auto; font-family: monospace; white-space: pre;
    }
    #importMsg { font-size: 12px; min-height: 18px; margin-top: 5px; }
    .imp-actions { display: flex; gap: 10px; margin-top: 12px; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">EDR SAI</div>
    <a href="/web" class="nav-link">Web</a>
    <a href="/log" class="nav-link active">Log</a>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <a href="/logout" class="logout-link" title="Cerrar sesión">Salir</a>
  </div>
</div>

<div id="wrap">
  <!-- Toolbar -->
  <div id="toolbar">
    <label>Desde (m)</label>
    <input type="number" id="depthFrom" value="0" step="10"/>
    <label>Hasta (m)</label>
    <input type="number" id="depthTo" value="500" step="10"/>
    <button class="btn btn-primary" onclick="drawAll()">Ver</button>
    <button class="btn btn-primary" onclick="fitAll()">Ajustar todo</button>
    <button class="btn btn-success" onclick="openImport()">⬆ LAS / CSV</button>
    <button class="btn btn-danger"  onclick="clearAll()">Limpiar</button>
    <div id="statusBar">Sin datos</div>
  </div>

  <!-- Charts + labels -->
  <div id="main">
    <div id="labels">
      <div style="height:28px;border-bottom:1px solid #2e3340;"></div>
      <div class="track-label" id="lblGamma"  style="flex:1;">Gamma Ray<span class="unit">0 — 150 API</span></div>
      <div class="track-label" id="lblRastros" style="flex:1;">Rastros<span class="unit">0=S/R … 4=Abund.</span></div>
      <div class="track-label" id="lblGas"    style="flex:1;">Gas Total<span class="unit">0 — 500 unid.</span></div>
    </div>

    <div id="charts">
      <div id="depthAxis"><canvas id="depthAxisCanvas"></canvas></div>
      <div class="track" id="trackGamma">  <canvas id="canvasGamma"></canvas>  </div>
      <div class="track" id="trackRastros"><canvas id="canvasRastros"></canvas></div>
      <div class="track" id="trackGas">   <canvas id="canvasGas"></canvas>    </div>
      <div id="cursorLine"></div>
    </div>
  </div>
</div>

<!-- Import modal -->
<div id="importOverlay">
  <div id="importBox">
    <h2>⬆ Importar LAS / CSV</h2>
    <div class="imp-row">
      <label>Archivo (.las / .csv)</label>
      <input type="file" id="impFile" accept=".las,.csv,.txt" onchange="onFileSelected()"/>
    </div>
    <div id="importPreview">Seleccioná un archivo...</div>
    <div class="imp-row">
      <label>Profundidad *</label>
      <select id="mapDepth"><option value="">— seleccionar —</option></select>
    </div>
    <div class="imp-row">
      <label>Gamma Ray</label>
      <select id="mapGamma"><option value="">— ninguna —</option></select>
    </div>
    <div class="imp-row">
      <label>Gas Total</label>
      <select id="mapGas"><option value="">— ninguna —</option></select>
    </div>
    <div class="imp-row">
      <label>Petróleo (0/1)</label>
      <select id="mapOil"><option value="">— ninguna —</option></select>
    </div>
    <div class="imp-row">
      <label>Gas Show (0/1)</label>
      <select id="mapGasShow"><option value="">— ninguna —</option></select>
    </div>
    <div id="importMsg"></div>
    <div class="imp-actions">
      <button class="btn btn-success" onclick="doImport()">Importar</button>
      <button class="btn btn-primary" onclick="closeImport()">Cancelar</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Data store (client-side only, no server persistence needed) ───────────────
let _data = [];   // [{depth, gamma, gas, oil_show, gas_show}]

// Track scales
const GAMMA_MIN = 0, GAMMA_MAX = 150;
const GAS_MIN   = 0;
let   GAS_MAX   = 500;  // updated dynamically on import

// Canvas refs
const cvs = {
  axis:    document.getElementById('depthAxisCanvas'),
  gamma:   document.getElementById('canvasGamma'),
  rastros: document.getElementById('canvasRastros'),
  gas:     document.getElementById('canvasGas'),
};

// ── Resize ────────────────────────────────────────────────────────────────────
function resizeAll() {
  const tracks = [
    { wrap: 'trackGamma',   cv: 'canvasGamma',   lbl: 'lblGamma'   },
    { wrap: 'trackRastros', cv: 'canvasRastros',  lbl: 'lblRastros' },
    { wrap: 'trackGas',     cv: 'canvasGas',      lbl: 'lblGas'     },
  ];
  const axis = document.getElementById('depthAxis');
  cvs.axis.width  = axis.clientWidth;
  cvs.axis.height = axis.clientHeight;

  tracks.forEach(t => {
    const wrap = document.getElementById(t.wrap);
    const c    = document.getElementById(t.cv);
    c.width  = wrap.clientWidth;
    c.height = wrap.clientHeight;
    document.getElementById(t.lbl).style.height = wrap.clientHeight + 'px';
  });
  drawAll();
}
window.addEventListener('resize', resizeAll);

// ── Helpers ───────────────────────────────────────────────────────────────────
function getWindow() {
  return {
    from: parseFloat(document.getElementById('depthFrom').value) || 0,
    to:   parseFloat(document.getElementById('depthTo').value)   || 500,
  };
}

function dToX(depth, W, from, to) {
  return ((depth - from) / (to - from)) * W;
}

function visiblePts() {
  const { from, to } = getWindow();
  return _data.filter(d => d.depth >= from - 0.5 && d.depth <= to + 0.5);
}

function drawGrid(ctx, W, H, from, to) {
  const range = to - from;
  const mag   = Math.pow(10, Math.floor(Math.log10(range / 8)));
  const step  = Math.ceil((range / 8) / mag) * mag;
  const start = Math.ceil(from / step) * step;
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth   = 1;
  for (let d = start; d <= to + 0.01; d += step) {
    const x = Math.round(dToX(d, W, from, to));
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}

// ── Draw depth axis ───────────────────────────────────────────────────────────
function drawAxis() {
  const c = cvs.axis, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1d23'; ctx.fillRect(0, 0, W, H);

  const range = to - from;
  const mag   = Math.pow(10, Math.floor(Math.log10(range / 8)));
  const step  = Math.ceil((range / 8) / mag) * mag;
  const start = Math.ceil(from / step) * step;

  ctx.fillStyle   = '#8898bb';
  ctx.font        = '10px Segoe UI';
  ctx.textAlign   = 'center';
  ctx.strokeStyle = '#3a4055';
  ctx.lineWidth   = 1;

  for (let d = start; d <= to + 0.01; d += step) {
    const x = Math.round(dToX(d, W, from, to));
    ctx.beginPath(); ctx.moveTo(x, H - 5); ctx.lineTo(x, H); ctx.stroke();
    ctx.fillText(d.toFixed(0) + ' m', x, H - 7);
  }
}

// ── Draw Gamma ────────────────────────────────────────────────────────────────
function drawGamma(pts) {
  const c = cvs.gamma, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1e2129'; ctx.fillRect(0, 0, W, H);
  drawGrid(ctx, W, H, from, to);

  for (let v = 0; v <= GAMMA_MAX; v += 30) {
    const y = H - (v / GAMMA_MAX) * H;
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillStyle = 'rgba(180,210,255,0.22)'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
    ctx.fillText(v, 2, y - 2);
  }

  const gpts = pts.filter(p => p.gamma != null);
  if (gpts.length < 2) return;

  ctx.beginPath();
  ctx.moveTo(dToX(gpts[0].depth, W, from, to), H);
  gpts.forEach(p => ctx.lineTo(dToX(p.depth, W, from, to), H - ((p.gamma - GAMMA_MIN) / (GAMMA_MAX - GAMMA_MIN)) * H));
  ctx.lineTo(dToX(gpts[gpts.length-1].depth, W, from, to), H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(80,180,80,0.5)'; ctx.fill();

  ctx.beginPath();
  gpts.forEach((p, i) => {
    const x = dToX(p.depth, W, from, to);
    const y = H - ((p.gamma - GAMMA_MIN) / (GAMMA_MAX - GAMMA_MIN)) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#70e070'; ctx.lineWidth = 1.5; ctx.stroke();
}

// ── Draw Rastros ──────────────────────────────────────────────────────────────
// Rastros scale: 0=S/R, 1=Aislados, 2=Escasos, 3=Regulares, 4=Abundantes
const RASTROS_MAX = 4;
const RASTROS_COLORS = ['#1e2129','#6b3a0a','#c8820a','#e8a020','#ffe040'];

function drawRastros(pts) {
  const c = cvs.rastros, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1e2129'; ctx.fillRect(0, 0, W, H);
  drawGrid(ctx, W, H, from, to);

  // Background hint
  ctx.fillStyle = 'rgba(200,130,10,0.07)'; ctx.fillRect(0, 0, W, H);

  // Legend: intensity scale labels on left
  ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(230,180,80,0.5)';
  ctx.fillText('RASTROS HC', 4, 11);
  ['S/R','Aisl.','Esc.','Reg.','Abu.'].forEach((lbl, i) => {
    const y = H - (i / RASTROS_MAX) * (H - 4) - 2;
    ctx.fillStyle = 'rgba(200,160,60,0.25)';
    ctx.fillText(lbl, 2, y);
  });

  // Bar width
  const range = to - from;
  const barW = Math.max(2, Math.min(14, (W / range) * 0.9));

  // Draw bars proportional to rastros intensity (0-4)
  pts.forEach(p => {
    const val = p.rastros != null ? p.rastros : (p.oil_show ? 1 : 0);
    if (!val || val <= 0) return;
    const x     = dToX(p.depth, W, from, to);
    const ratio = Math.min(val, RASTROS_MAX) / RASTROS_MAX;
    const barH  = Math.max(2, ratio * (H - 4));
    const colIdx = Math.min(Math.round(val), RASTROS_COLORS.length - 1);
    ctx.fillStyle   = RASTROS_COLORS[colIdx];
    ctx.globalAlpha = 0.88;
    ctx.fillRect(x - barW / 2, H - barH - 2, barW, barH);
    ctx.globalAlpha = 1;
  });

  // Horizontal reference lines
  for (let v = 1; v <= RASTROS_MAX; v++) {
    const y = H - (v / RASTROS_MAX) * (H - 4) - 2;
    ctx.strokeStyle = 'rgba(255,200,80,0.08)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

// ── Draw Gas ──────────────────────────────────────────────────────────────────
function drawGas(pts) {
  const c = cvs.gas, ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const { from, to } = getWindow();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1e2129'; ctx.fillRect(0, 0, W, H);
  drawGrid(ctx, W, H, from, to);

  for (let v = 0; v <= GAS_MAX; v += 100) {
    const y = H - (v / GAS_MAX) * H;
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillStyle = 'rgba(180,210,255,0.22)'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
    ctx.fillText(v, 2, y - 2);
  }

  const gpts = pts.filter(p => p.gas != null);
  if (gpts.length < 2) return;

  ctx.beginPath();
  ctx.moveTo(dToX(gpts[0].depth, W, from, to), H);
  gpts.forEach(p => ctx.lineTo(dToX(p.depth, W, from, to), Math.max(0, H - ((p.gas - GAS_MIN) / (GAS_MAX - GAS_MIN)) * H)));
  ctx.lineTo(dToX(gpts[gpts.length-1].depth, W, from, to), H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(30,100,200,0.5)'; ctx.fill();

  ctx.beginPath();
  gpts.forEach((p, i) => {
    const x = dToX(p.depth, W, from, to);
    const y = Math.max(0, H - ((p.gas - GAS_MIN) / (GAS_MAX - GAS_MIN)) * H);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#4ab0ff'; ctx.lineWidth = 1.5; ctx.stroke();
}

// ── Draw all ──────────────────────────────────────────────────────────────────
function drawAll() {
  const pts = visiblePts();
  drawAxis();
  drawGamma(pts);
  drawRastros(pts);
  drawGas(pts);

  const sb = document.getElementById('statusBar');
  if (!_data.length) { sb.textContent = 'Sin datos'; return; }
  const mn = _data[0].depth, mx = _data[_data.length-1].depth;
  sb.textContent = `${_data.length} pts | ${mn.toFixed(1)} — ${mx.toFixed(1)} m`;
}

function fitAll() {
  if (!_data.length) return;
  document.getElementById('depthFrom').value = Math.floor(_data[0].depth);
  document.getElementById('depthTo').value   = Math.ceil(_data[_data.length-1].depth);
  drawAll();
}

function clearAll() {
  if (!confirm('¿Borrar todos los datos del Log?')) return;
  _data = [];
  drawAll();
}

// ── Cursor + Zoom + Pan (todos los tracks sincronizados) ──────────────────────
const chartsDiv = document.getElementById('charts');
const cursor    = document.getElementById('cursorLine');

// helpers
function setWindow(from, to) {
  if (to - from < 5) return;          // minimum 5 m window
  document.getElementById('depthFrom').value = from.toFixed(2);
  document.getElementById('depthTo').value   = to.toFixed(2);
}

// ── Cursor line ───────────────────────────────────────────────────────────────
chartsDiv.addEventListener('mousemove', e => {
  const rect  = chartsDiv.getBoundingClientRect();
  const x     = e.clientX - rect.left;
  cursor.style.left    = x + 'px';
  cursor.style.display = 'block';
  const { from, to } = getWindow();
  const depth = from + (x / chartsDiv.clientWidth) * (to - from);
  document.getElementById('statusBar').textContent =
    `${depth.toFixed(1)} m | ${_data.length} pts`;
});
chartsDiv.addEventListener('mouseleave', () => {
  cursor.style.display = 'none';
  if (!_data.length) return;
  const mn = _data[0].depth, mx = _data[_data.length-1].depth;
  document.getElementById('statusBar').textContent =
    `${_data.length} pts | ${mn.toFixed(1)} — ${mx.toFixed(1)} m`;
});

// ── Zoom con rueda del mouse ──────────────────────────────────────────────────
// Zoom centrado en la posición del cursor
chartsDiv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect    = chartsDiv.getBoundingClientRect();
  const xRatio  = (e.clientX - rect.left) / chartsDiv.clientWidth;
  const { from, to } = getWindow();
  const range   = to - from;
  const factor  = e.deltaY > 0 ? 1.15 : (1 / 1.15);  // scroll down = zoom out
  const newRange = range * factor;
  const pivot   = from + xRatio * range;               // depth under cursor
  const newFrom = pivot - xRatio * newRange;
  const newTo   = pivot + (1 - xRatio) * newRange;
  setWindow(newFrom, newTo);
  drawAll();
}, { passive: false });

// ── Pan con click + drag ──────────────────────────────────────────────────────
let _drag = null;
chartsDiv.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const { from, to } = getWindow();
  _drag = { startX: e.clientX, from, to, range: to - from };
  chartsDiv.style.cursor = 'grabbing';
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!_drag) return;
  const rect    = chartsDiv.getBoundingClientRect();
  const dxPx    = e.clientX - _drag.startX;
  const dDepth  = -(dxPx / chartsDiv.clientWidth) * _drag.range;
  setWindow(_drag.from + dDepth, _drag.to + dDepth);
  drawAll();
});
window.addEventListener('mouseup', () => {
  if (_drag) { _drag = null; chartsDiv.style.cursor = ''; }
});

// ── Import modal ──────────────────────────────────────────────────────────────
let _impFile = null;

function openImport()  { document.getElementById('importOverlay').classList.add('open'); }
function closeImport() { document.getElementById('importOverlay').classList.remove('open'); }
document.getElementById('importOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('importOverlay')) closeImport();
});

function _fillSelects(cols) {
  const ids    = ['mapDepth','mapGamma','mapGas','mapOil','mapGasShow'];
  const blanks = ['— seleccionar —','— ninguna —','— ninguna —','— ninguna —','— ninguna —'];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">${blanks[i]}</option>`;
    cols.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; el.appendChild(o); });
  });
  const auto = {
    mapDepth:   ['DEPT','DEPTH','MD','DPTH','PROFUNDIDAD','PROF','DEPTM'],
    mapGamma:   ['GR','GAMMA','GR_N','GRC','GRS'],
    mapGas:     ['GASTOTAL','GAS','GASTOT','GAS_TOTAL','GTOT'],
    mapOil:     ['RASTROS','OIL','OIL_SHOW','PETROLEO'],
    mapGasShow: ['GAS_SHOW','GASSHOW'],
  };
  for (const [id, cands] of Object.entries(auto)) {
    const m = cols.find(c => cands.includes(c.toUpperCase()));
    if (m) document.getElementById(id).value = m;
  }
}

async function onFileSelected() {
  const input = document.getElementById('impFile');
  _impFile = input.files[0];
  if (!_impFile) return;
  const msg  = document.getElementById('importMsg');
  const prev = document.getElementById('importPreview');
  msg.textContent = 'Leyendo...'; msg.style.color = '#7ec8f7';
  const fd = new FormData(); fd.append('file', _impFile);
  try {
    const res  = await fetch('/api/log/parse', { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.ok) { msg.textContent = '✗ ' + data.error; msg.style.color = '#e05050'; return; }
    _fillSelects(data.columns);
    const cols = data.columns, rows = data.preview;
    let txt = cols.join('\t') + '\n';
    rows.forEach(r => { txt += cols.map(c => r[c] != null ? r[c] : '—').join('\t') + '\n'; });
    prev.textContent = txt;
    msg.textContent = `✓ ${cols.length} columnas`; msg.style.color = '#50d090';
  } catch(e) {
    msg.textContent = '✗ Error'; msg.style.color = '#e05050';
  }
}

async function doImport() {
  if (!_impFile) { document.getElementById('importMsg').textContent = '⚠ Seleccioná un archivo'; return; }
  const colDepth = document.getElementById('mapDepth').value;
  if (!colDepth) { document.getElementById('importMsg').textContent = '⚠ Seleccioná columna profundidad'; return; }
  const msg = document.getElementById('importMsg');
  msg.textContent = 'Importando...'; msg.style.color = '#7ec8f7';

  const fd = new FormData();
  fd.append('file',         _impFile);
  fd.append('col_depth',    colDepth);
  fd.append('col_gamma',    document.getElementById('mapGamma').value);
  fd.append('col_gas',      document.getElementById('mapGas').value);
  fd.append('col_oil_show', document.getElementById('mapOil').value);
  fd.append('col_gas_show', document.getElementById('mapGasShow').value);

  try {
    const res  = await fetch('/api/log/import', { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.ok) { msg.textContent = '✗ ' + data.error; msg.style.color = '#e05050'; return; }

    // Load rows into client memory
    _data = _data.concat(data.rows);
    _data.sort((a, b) => a.depth - b.depth);
    // Update GAS_MAX dynamically
    const maxGas = Math.max(..._data.filter(p => p.gas != null).map(p => p.gas), 0);
    if (maxGas > 0) GAS_MAX = Math.ceil(maxGas / 500) * 500;

    msg.textContent = `✓ ${data.inserted} filas cargadas`; msg.style.color = '#50d090';
    fitAll();
    setTimeout(closeImport, 1000);
  } catch(e) {
    msg.textContent = '✗ Error al importar'; msg.style.color = '#e05050';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => { resizeAll(); });
</script>
