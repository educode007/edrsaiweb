<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EDRsai — Compass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0e1117; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; }

    .hdr {
      height: 42px; background: #10162a; color: #d4defb;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 10px; border-bottom: 2px solid #060a15;
    }
    .hdr-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-weight: 900; letter-spacing: .1em; color: #7ec8ff; }
    .nav-link { color: #99aacc; text-decoration: none; font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
    .nav-link:hover { background: #1f2740; color: #dde7ff; }
    .nav-link.active { background: #1a2d60; color: #9ed2ff; }

    .status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #8898bb; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3a3a; }
    .dot.live { background: #00bf63; box-shadow: 0 0 6px #00bf63; }

    .page {
      height: calc(100% - 42px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 8px;
      background: #0e1117;
    }

    .card {
      background: #181d28;
      border: 1px solid #2e3340;
      border-radius: 6px;
      overflow: hidden;
      min-height: 0;
    }

    .card-hdr {
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      color: #7ec8f7;
      border-bottom: 1px solid #2e3340;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #131720;
    }

    .chart-wrap {
      position: relative;
      height: calc(100% - 36px);
      min-height: 300px;
      background: #111520;
    }
    .chart-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    .gamma-tools { display: flex; align-items: center; gap: 6px; }
    .gamma-btn {
      border: 1px solid #3a4870;
      background: #1e2535;
      color: #7ec8f7;
      font-size: 11px;
      font-weight: 800;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
    }
    .gamma-btn:hover { background: #2a3550; }
    .gamma-hint { font-size: 10px; color: #4a5878; font-weight: 700; }

    .compass-layout {
      height: calc(100% - 36px);
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 0;
      padding: 8px;
      gap: 8px;
    }

    .compass-wrap {
      position: relative;
      min-height: 320px;
      background: #10131a;
      border: 1px solid #2e3340;
      border-radius: 6px;
      overflow: hidden;
    }
    .compass-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    .center-readout {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; text-align: center;
    }
    .center-title { font-size: 34px; font-weight: 900; line-height: 1; color: #e0eeff; }
    .center-sub { font-size: 16px; font-weight: 700; color: #7ec8f7; }

    .box-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .box-row.single { grid-template-columns: 1fr; }
    .box {
      border: 1px solid #2e3340;
      background: #131720;
      border-radius: 4px;
      padding: 5px 7px;
    }
    .box-label { font-size: 11px; font-weight: 800; color: #5a7090; text-transform: uppercase; letter-spacing: .05em; }
    .box-val { font-size: 30px; font-weight: 900; line-height: 1; margin-top: 2px; font-variant-numeric: tabular-nums; color: #d8ecff; }
    .box-time { margin-top: 2px; font-size: 10px; color: #3a5070; font-weight: 700; }

    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; grid-template-rows: 340px 1fr; }
      .compass-wrap { min-height: 260px; }
      .box-val { font-size: 26px; }
      .center-title { font-size: 28px; }
    }

    @media (max-width: 600px) {
      .hdr { height: 48px; padding: 0 8px; }
      .logo { font-size: 14px; }
      .nav-link { font-size: 11px; padding: 3px 6px; }
      .status { font-size: 11px; gap: 5px; }
      #clock { display: none; }
      .page {
        height: auto; min-height: calc(100vh - 48px);
        grid-template-columns: 1fr; grid-template-rows: auto auto;
        gap: 6px; padding: 6px;
      }
      .page > section:first-child { height: 280px; }
      .chart-wrap { min-height: 0; height: calc(100% - 36px); }
      .gamma-hint { display: none; }
      .gamma-btn { padding: 3px 10px; font-size: 12px; }
      .compass-layout { height: auto; padding: 6px; gap: 6px; }
      .compass-wrap { min-height: 0; height: 56vw; max-height: 320px; }
      .box-val { font-size: 34px; }
      .box-label { font-size: 12px; }
      .box-time { font-size: 11px; }
      .center-title { font-size: 32px; }
      .center-sub { font-size: 14px; }
      .box { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-left">
      <div class="logo">EDRsai</div>
      <a href="/web" class="nav-link active">Compass</a>
      <a href="/log" class="nav-link">Log</a>
    </div>
    <div class="status">
      <div id="dot" class="dot"></div>
      <span id="liveText">sin datos</span>
      <span id="clock">--:--:--</span>
      <span style="margin-left:10px;color:#ffffff;font-size:12px;font-weight:600;letter-spacing:0.02em;">PCR.MdN.Pro.x-4004(d) SAI-318</span>
      <a href="/logout" style="margin-left:10px;color:#99aacc;font-size:11px;font-weight:700;text-decoration:none;padding:3px 8px;border:1px solid #2a3a5a;border-radius:4px;letter-spacing:.03em;" title="Cerrar sesión">Salir</a>
    </div>
  </div>

  <div class="page">
    <section class="card">
      <div class="card-hdr">
        <span>Compass</span>
        <span id="pointsInfo">0 pts</span>
      </div>
      <div class="compass-layout">
        <div class="compass-wrap">
          <canvas id="compassCanvas"></canvas>
          <div class="center-readout">
            <div class="center-sub" id="centerMode">—</div>
            <div class="center-title" id="centerAz">—</div>
          </div>
        </div>
        <div class="box-row single">
          <div class="box">
            <div class="box-label">GAMMA</div>
            <div class="box-val" id="gammaVal">—</div>
            <div class="box-time" id="gammaTime">--:--:--</div>
          </div>
        </div>
        <div class="box-row">
          <div class="box">
            <div class="box-label">INCL</div>
            <div class="box-val" id="inclVal">—</div>
            <div class="box-time" id="inclTime">--:--:--</div>
          </div>
          <div class="box">
            <div class="box-label" id="azimLabel">AZIM</div>
            <div class="box-val" id="azimVal">—</div>
            <div class="box-time" id="azimTime">--:--:--</div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    'use strict';

    const params = new URLSearchParams(window.location.search);
    const _defaultBackend = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? 'http://127.0.0.1:5051'
      : window.location.origin;
    const backendOrigin = (params.get('backend') || _defaultBackend).replace(/\/$/, '');

    let lastGammaTs = null;
    let lastGammaFallbackKey = null;
    let lastCompassPoints = [];

    const dot = document.getElementById('dot');
    const liveText = document.getElementById('liveText');
    const clockEl = document.getElementById('clock');
    const inclVal = document.getElementById('inclVal');
    const azimVal = document.getElementById('azimVal');
    const azimLabel = document.getElementById('azimLabel');
    const gammaVal = document.getElementById('gammaVal');
    const inclTime = document.getElementById('inclTime');
    const azimTime = document.getElementById('azimTime');
    const gammaTime = document.getElementById('gammaTime');
    const centerMode = document.getElementById('centerMode');
    const centerAz = document.getElementById('centerAz');
    const pointsInfo = document.getElementById('pointsInfo');
    const compassCanvas = document.getElementById('compassCanvas');

    let liveTimer = null;
    let gammaOffset = 15.0;
    const COMPASS_SPACE_COUNT = 6;
    const COMPASS_POINT_COUNT = 5;
    const tfaTrail = []; // newest first

    function nowHms() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
    }

    setInterval(() => { clockEl.textContent = nowHms(); }, 1000);
    clockEl.textContent = nowHms();

    function setLive(isLive) {
      dot.classList.toggle('live', !!isLive);
      liveText.textContent = isLive ? 'en vivo' : 'sin datos';
    }

    function fitCanvas(cv) {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const w = Math.max(10, cv.clientWidth);
      const h = Math.max(10, cv.clientHeight);
      const tw = Math.round(w * dpr);
      const th = Math.round(h * dpr);
      if (cv.width !== tw || cv.height !== th) {
        cv.width = tw;
        cv.height = th;
      }
      const ctx = cv.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, w, h };
    }

    function fmt(v, dec = 1) {
      if (v == null || Number.isNaN(v)) return '—';
      return Number(v).toFixed(dec);
    }

    function gammaDepthFromHoleDepth(holeDepth) {
      if (holeDepth == null || Number.isNaN(holeDepth)) return null;
      return Number(holeDepth) - Number(gammaOffset || 0);
    }

    function niceStep(span, targetTicks) {
      const safeSpan = Math.max(1, Number(span) || 1);
      const raw = safeSpan / Math.max(2, targetTicks || 8);
      const p10 = Math.pow(10, Math.floor(Math.log10(raw)));
      const n = raw / p10;
      if (n <= 1) return 1 * p10;
      if (n <= 2) return 2 * p10;
      if (n <= 5) return 5 * p10;
      return 10 * p10;
    }

    function pickNumberByKeys(obj, keys) {
      for (const k of keys) {
        if (obj[k] != null) {
          const n = Number(obj[k]);
          if (Number.isFinite(n)) return n;
        }
      }
      return null;
    }

    function readIncomingTfa(d) {
      const gtfa = pickNumberByKeys(d, ['gTFA', 'gtfa', 'GTFA']);
      if (gtfa != null) {
        return { mode: 'gTFA', value: ((gtfa % 360) + 360) % 360, color: '#0b47f0' };
      }
      const mtfa = pickNumberByKeys(d, ['mTFA', 'mtfa', 'MTFA']);
      if (mtfa != null) {
        return { mode: 'mTFA', value: ((mtfa % 360) + 360) % 360, color: '#e11a1a' };
      }
      return null;
    }

    let _lastTfaValue = null;   // last pushed value (rounded to 1 decimal)
    let _lastTfaPushTime = 0;   // timestamp (ms) of last push
    const TFA_REPEAT_DELAY_MS = 14000; // 14s before pushing a repeated value

    function pushTfaTrail(tfa) {
      if (!tfa) return;
      const rounded = Math.round(tfa.value * 10) / 10;
      const now = Date.now();
      const diff = _lastTfaValue == null ? 999 : Math.min(
        Math.abs(rounded - _lastTfaValue),
        360 - Math.abs(rounded - _lastTfaValue)
      );
      const valueChanged = diff > 1.0;
      const timedOut = (now - _lastTfaPushTime) >= TFA_REPEAT_DELAY_MS;

      if (!valueChanged && !timedOut) return; // same value, not yet 14s → skip

      _lastTfaValue = rounded;
      _lastTfaPushTime = now;
      // Sliding queue: new value enters [0], everything shifts down
      tfaTrail.unshift({ mode: tfa.mode, value: tfa.value, color: tfa.color });
      if (tfaTrail.length > COMPASS_POINT_COUNT) {
        tfaTrail.splice(COMPASS_POINT_COUNT);
      }
    }

    function trailToCompassPoints() {
      // Place each point BETWEEN two consecutive rings, not on a ring line.
      // Ring i has radius = (R * i) / COMPASS_SPACE_COUNT  (i=1 innermost drawn, i=6 outermost)
      // idx=0 (newest) → between ring 6 and ring 5  → midpoint r = (5.5/6)
      // idx=1          → between ring 5 and ring 4  → midpoint r = (4.5/6)
      // idx=n          → midpoint r = (COMPASS_SPACE_COUNT - idx - 0.5) / COMPASS_SPACE_COUNT
      return tfaTrail.map((p, idx) => ({
        az: p.value,
        r: (COMPASS_SPACE_COUNT - idx - 0.5) / COMPASS_SPACE_COUNT,
        color: p.color,
      }));
    }

    function buildCompassPointsFromPayload(d) {
      if (Array.isArray(d.compass_points) && d.compass_points.length) return d.compass_points;

      const gtfa = pickNumberByKeys(d, ['gTFA', 'gtfa', 'GTFA']);
      const mtfa = pickNumberByKeys(d, ['mTFA', 'mtfa', 'MTFA']);
      const out = [];

      if (gtfa != null) out.push({ az: gtfa, r: 0.95, label: 'gTFA', color: '#0b47f0' });
      if (mtfa != null) out.push({ az: mtfa, r: 0.55, label: 'mTFA', color: '#e11a1a' });

      return out;
    }

    function drawCompass(points, azimNow) {
      const { ctx, w, h } = fitCanvas(compassCanvas);
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const labelMargin = 34;
      const R = Math.max(40, (Math.min(w, h) / 2) - labelMargin);

      ctx.fillStyle = '#10131a';
      ctx.fillRect(0, 0, w, h);

      // Rings
      ctx.lineWidth = 1;
      for (let i = 1; i <= COMPASS_SPACE_COUNT; i++) {
        ctx.strokeStyle = i === COMPASS_SPACE_COUNT ? '#3a4870' : '#1e2840';
        ctx.beginPath();
        ctx.arc(cx, cy, (R * i) / COMPASS_SPACE_COUNT, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Tick marks
      for (let deg = 0; deg < 360; deg += 10) {
        const a = (deg - 90) * Math.PI / 180;
        const r1 = R;
        const r2 = R - (deg % 30 === 0 ? 10 : 5);
        ctx.strokeStyle = deg % 90 === 0 ? '#4a6090' : '#2a3550';
        ctx.lineWidth = deg % 90 === 0 ? 1.5 : 1;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
        ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
        ctx.stroke();
      }

      // Cardinal labels
      const dir = [
        { d: 0, t: '0' },
        { d: 90, t: '90' },
        { d: 180, t: '180' },
        { d: 270, t: '270' }
      ];
      ctx.fillStyle = '#6080a8';
      ctx.font = 'bold 16px Segoe UI';
      dir.forEach(({ d, t }) => {
        const a = (d - 90) * Math.PI / 180;
        const rr = R + 16;
        const tx = cx + Math.cos(a) * rr;
        const ty = cy + Math.sin(a) * rr;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(t, tx, ty);
      });

      // Current azim pointer
      if (Number.isFinite(azimNow)) {
        const a = (azimNow - 90) * Math.PI / 180;
        ctx.strokeStyle = '#7ec8f7';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * (R * 0.95), cy + Math.sin(a) * (R * 0.95));
        ctx.stroke();
        // Arrow tip
        ctx.fillStyle = '#7ec8f7';
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * (R * 0.95), cy + Math.sin(a) * (R * 0.95), 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Payload points
      let n = 0;
      for (const p of (Array.isArray(points) ? points : [])) {
        const az = Number(p.az);
        let rr = Number(p.r);
        if (!Number.isFinite(az) || !Number.isFinite(rr)) continue;
        if (rr > 1) rr = rr / 100;
        rr = Math.max(0, Math.min(1, rr));
        const a = (az - 90) * Math.PI / 180;
        const pr = R * rr;
        const px = cx + Math.cos(a) * pr;
        const py = cy + Math.sin(a) * pr;

        ctx.fillStyle = p.color || (n % 2 === 0 ? '#4080ff' : '#ff5050');
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();

        if (p.label) {
          ctx.fillStyle = '#a0c0e0';
          ctx.font = 'bold 11px Segoe UI';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(p.label, px + 6, py);
        }
        n += 1;
      }
      pointsInfo.textContent = `${n} pts`;
    }

    function applyData(d) {
      if (!d || typeof d !== 'object') return;

      const incl = d.incl != null ? Number(d.incl) : null;
      const azim = d.azim != null ? Number(d.azim) : null;
      const gamma = d.gamma != null ? Number(d.gamma) : null;
      const depth = d.hole_depth != null ? Number(d.hole_depth) : null;
      if (d.gamma_offset != null) {
        const off = Number(d.gamma_offset);
        if (Number.isFinite(off)) gammaOffset = off;
      }
      const gammaDepth = gammaDepthFromHoleDepth(depth);

      if (incl != null) {
        inclVal.textContent = fmt(incl, 1);
        inclTime.textContent = nowHms();
      }
      // AZIM box: prefer real azim, fallback to gTFA toolface
      const gtfaForAzim = d.gTFA != null ? Number(d.gTFA) : null;
      if (azim != null) {
        azimVal.textContent = fmt(azim, 1);
        azimTime.textContent = nowHms();
        if (azimLabel) azimLabel.textContent = 'AZIM';
      } else if (gtfaForAzim != null && Number.isFinite(gtfaForAzim)) {
        azimVal.textContent = fmt(((gtfaForAzim % 360) + 360) % 360, 1);
        azimTime.textContent = nowHms();
        if (azimLabel) azimLabel.textContent = 'T.AZM';
      }

      const incomingTfa = readIncomingTfa(d);
      if (incomingTfa) {
        pushTfaTrail(incomingTfa);
      }
      if (tfaTrail.length) {
        centerMode.textContent = tfaTrail[0].mode;
        centerAz.textContent = fmt(tfaTrail[0].value, 1);
      } else {
        centerMode.textContent = '—';
        centerAz.textContent = '—';
      }

      const gammaTick = d.gamma_ts != null ? d.gamma_ts : d.ts;
      const gammaFallbackKey = `${gammaDepth}|${gamma}`;
      if (gammaDepth != null && gamma != null) {
        if (gammaTick != null) {
          if (gammaTick !== lastGammaTs) {
            lastGammaTs = gammaTick;
            gammaVal.textContent = fmt(gamma, 1);
            gammaTime.textContent = nowHms();
          }
        } else if (gammaFallbackKey !== lastGammaFallbackKey) {
          lastGammaFallbackKey = gammaFallbackKey;
          gammaVal.textContent = fmt(gamma, 1);
          gammaTime.textContent = nowHms();
        }
      }

      lastCompassPoints = trailToCompassPoints();

      drawCompass(lastCompassPoints, azim);

      setLive(true);
      clearTimeout(liveTimer);
      liveTimer = setTimeout(() => setLive(false), 5000);
    }

    async function loadHistory() {
      try {
        let r = await fetch(`${backendOrigin}/api/web/history?limit=1200`);
        if (!r || !r.ok) {
          r = await fetch(`${backendOrigin}/api/history?limit=1200`);
        }
        if (!r || !r.ok) return;
        const rows = await r.json();
        // No need to load history for compass-only view
      } catch (_) {
      }
    }

    async function pollState() {
      try {
        let r = await fetch(`${backendOrigin}/api/web/state`, { cache: 'no-store' });
        if (!r || !r.ok) {
          r = await fetch(`${backendOrigin}/api/state`, { cache: 'no-store' });
        }
        if (r && r.ok) applyData(await r.json());
      } catch (_) {
      }
    }

    const socket = io(backendOrigin, { transports: ['websocket', 'polling'] });
    socket.on('connect', () => setLive(false));
    socket.on('disconnect', () => setLive(false));
    socket.on('web_update', applyData);

    window.addEventListener('resize', () => {
      drawCompass(lastCompassPoints, Number(azimVal.textContent));
    });


    loadHistory();
    pollState();
    setInterval(pollState, 1500);
  </script>
</body>
</html>
